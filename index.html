<!DOCTYPE html>

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BARBERARIA</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial,sans-serif;
        }

        body {
            background: linear-gradient( 135deg, #0f172a, #1e293b, #111827 );
            color: white;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(245,176,65,0.5);
        }

        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 6px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn {
            background: #f5b041;
            width: 100%;
        }

            .btn:hover {
                background: #d68910;
            }

        .admin-btn {
            background: #3498db;
            color: white;
            margin-bottom: 20px;
            width: 100%;
        }

        .btn,
        .admin-btn {
            transition: all 0.3s ease;
        }

            .btn:hover,
            .admin-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f5b041;
            color: black;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        .excluir {
            background: #e74c3c;
            color: white;
        }

        .whatsapp {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            color: white;
            padding: 15px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0,0,0,.4);
        }

        #adminArea {
            display: none;
        }

        .info {
            background: #2c2c2c;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        option:disabled {
            color: #888;
            background: #2c2c2c;
        }
    </style>

</head>

<body>

    <div class="container">

        <button class="admin-btn" onclick="abrirLogin()">
            🔐 Área do Administrador
        </button>

        <div id="clienteArea">

            <div class="card">

                <h1>💈 BARBEARIA 💈</h1>

                <input type="text" id="nome" placeholder="Nome">

                <input type="tel" id="telefone" placeholder="Telefone" inputmode="numeric" pattern="[0-9]*">

                <select id="servico">
                    <option value="">Selecione o serviço</option>
                    <option>Corte Masculino</option>
                    <option>Barba</option>
                    <option>Corte + Barba</option>
                    <option>Sobrancelha</option>

                </select>

                <input type="date" id="data">

                <select id="hora">
                    <option value="">Selecione o horário</option>
                    <option>08:00</option>
                    <option>08:30</option>
                    <option>09:00</option>
                    <option>09:30</option>
                    <option>10:00</option>
                    <option>10:30</option>
                    <option>11:00</option>
                    <option>11:30</option>
                    <option>13:00</option>
                    <option>13:30</option>
                    <option>14:00</option>
                    <option>14:30</option>
                    <option>15:00</option>
                    <option>15:30</option>
                    <option>16:00</option>
                    <option>16:30</option>
                    <option>17:00</option>
                    <option>17:30</option>
                    <option>18:00</option>
                    <option>18:30</option>
                </select>

                <button class="btn" id="btnAgendar" onclick="agendar()">
                    Agendar Horário
                </button>

            </div>

        </div>

        <div id="adminArea">

            <div class="card">

                <h2>Painel do Barbeiro</h2>

                <div class="info">
                    Total de Agendamentos:
                    <span id="total">0</span>
                </div>

                <div class="info">
                    Faturamento:
                    R$ <span id="faturamento">0</span>
                </div>

                <button class="btn" onclick="alterarEmail()">
                    📧 Alterar Email
                </button>

                <br><br>

                <button class="btn" onclick="alterarSenha()">
                    🔑 Alterar Senha
                </button>

            </div>

            <table>

                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Serviço</th>
                        <th>Data</th>
                        <th>Hora</th>
                        <th>Ação</th>
                    </tr>
                </thead>

                <tbody id="lista"></tbody>

            </table>

            <br>

            <button class="btn" onclick="fecharAdmin()">
                Voltar
            </button>

        </div>

    </div>

    <a class="whatsapp"
       href="https://wa.me/5522998168216"
       target="_blank">
        📱 WhatsApp
    </a>

    <script>

        let agendamentos =
            JSON.parse(localStorage.getItem("agendamentos")) || [];

        const precos = {
            "Corte Masculino": 30,
            "Barba": 20,
            "Corte + Barba": 45,
            "Sobrancelha": 10
        };

        function salvar() {
            localStorage.setItem(
                "agendamentos",
                JSON.stringify(agendamentos)
            );
        }

        function calcularFaturamento() {

            let faturamento = 0;

            agendamentos.forEach(a => {
                faturamento += precos[a.servico] || 0;
            });

            return faturamento;
        }

        function agendar() {

            const nome =
                document.getElementById("nome").value;

            const telefone =
                document.getElementById("telefone").value;

            const servico =
                document.getElementById("servico").value;

            const data =
                document.getElementById("data").value;

            const hora =
                document.getElementById("hora").value;

            if (!nome || !telefone || !servico || !data || !hora) {

                alert("PREENCHA TODOS OS CAMPOS");
                return;

            }

            const ocupado =
                agendamentos.some(a =>
                    a.data === data &&
                    a.hora === hora
                );

            if (ocupado) {

                alert("Horário já ocupado!");
                return;

            }

            const confirmacao = confirm(
                `Confirmar agendamento?

                                Nome: ${nome}
                                Serviço: ${servico}
                                Data: ${data}
                                Hora: ${hora}`
            );

            if (!confirmacao) {
                return;
            }

            agendamentos.push({
                nome,
                telefone,
                servico,
                data,
                hora
            });

            salvarNoFirebase(
                nome,
                telefone,
                servico,
                data,
                hora
            );


            salvar();

            atualizarHorarios();

            if (document.getElementById("adminArea").offsetParent !== null) {
                carregarTabela();
            }


            alert("Agendamento realizado!");

            document.getElementById("nome").value = "";
            document.getElementById("telefone").value = "";
            document.getElementById("servico").value = "";
            document.getElementById("data").value = "";
            document.getElementById("hora").value = "";

        }
        async function abrirLogin() {

            const email = prompt(
                "Digite o email do administrador:"
            );

            if (!email) return;

            const senha = prompt(
                "Digite a senha:"
            );

            if (!senha) return;

            try {

                await window.signInWithEmailAndPassword(
                    window.auth,
                    email,
                    senha
                );

                document.getElementById("clienteArea")
                    .style.display = "none";

                document.getElementById("adminArea")
                    .style.display = "block";

                carregarTabela();

                alert("Login realizado!");

            } catch (erro) {

                console.error(erro);

                alert(
                    "Erro Firebase: " +
                    erro.code +
                    "\n" +
                    erro.message
                );

            }
        }

        function fecharAdmin() {

            document.getElementById("clienteArea")
                .style.display = "block";

            document.getElementById("adminArea")
                .style.display = "none";

        }

        async function carregarTabela() {

            const lista = document.getElementById("lista");

            lista.innerHTML = "";

            const querySnapshot = await window.getDocs(
                window.collection(window.db, "Agendamentos")
            );

            let total = 0;
            let faturamento = 0;

            querySnapshot.forEach((doc) => {

                const a = doc.data();

                lista.innerHTML += `
            <tr>
                <td>${a.nome}</td>
                <td>${a.telefone}</td>
                <td>${a.servico}</td>
                <td>${a.data}</td>
                <td>${a.hora}</td>
                <td>-</td>
            </tr>
            `;

                total++;

                faturamento += precos[a.servico] || 0;

            });

            document.getElementById("total").innerText = total;

            document.getElementById("faturamento").innerText =
                faturamento.toFixed(2);
        }

        function excluir(index) {

            if (confirm("Excluir agendamento?")) {

                agendamentos.splice(index, 1);

                salvar();

                carregarTabela();

                atualizarHorarios();
            }

        }


        function atualizarHorarios() {

            const dataSelecionada =
                document.getElementById("data").value;

            const selectHora =
                document.getElementById("hora");

            for (let i = 0; i < selectHora.options.length; i++) {

                const option = selectHora.options[i];

                if (option.value === "") continue;

                option.disabled = agendamentos.some(a =>
                    a.data === dataSelecionada &&
                    a.hora === option.value
                );
            }
        }

        async function alterarEmail() {

            const senha = prompt("Digite sua senha atual:");
            if (!senha) return;

            const novoEmail = prompt("Digite o novo email:");
            if (!novoEmail) return;

            try {

                const user = window.auth.currentUser;

                const credential = EmailAuthProvider.credential(
                    user.email,
                    senha
                );

                await reauthenticateWithCredential(user, credential);

                await updateEmail(user, novoEmail);

                alert("Email alterado com sucesso!");

            } catch (erro) {

                alert("Erro: " + erro.message);

            }
        }

        async function alterarSenha() {

            const senhaAtual = prompt("Digite sua senha atual:");
            if (!senhaAtual) return;

            const novaSenha = prompt("Digite a nova senha:");
            if (!novaSenha) return;

            try {

                const user = window.auth.currentUser;

                const credential = EmailAuthProvider.credential(
                    user.email,
                    senhaAtual
                );

                await reauthenticateWithCredential(user, credential);

                await updatePassword(user, novaSenha);

                alert("Senha alterada com sucesso!");

            } catch (erro) {

                alert("Erro: " + erro.message);

            }
        }

        window.addEventListener("DOMContentLoaded", function () {

            atualizarHorarios();

            document.getElementById("data")
                .addEventListener("change", atualizarHorarios);

            document.getElementById("servico").addEventListener("change", function () {

                const servico = this.value;
                const preco = precos[servico] || 0;

                document.getElementById("btnAgendar").innerText =
                    `Agendar - R$ ${preco}`;
            });

        });



    </script>

        <script type="module">

            import {initializeApp} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

            import {
                getAuth,
                signInWithEmailAndPassword,
                updateEmail,
                updatePassword,
                EmailAuthProvider,
                reauthenticateWithCredential
            } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

            import {
                getFirestore,
                collection,
                addDoc,
                getDocs
            } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

            const firebaseConfig = {
                apiKey: "AIzaSyA32KtwwDhRaP6QSGoBze9ybHkaGzsxpx8",
            authDomain: "barbeiro-6011e.firebaseapp.com",
            projectId: "barbeiro-6011e",
            storageBucket: "barbeiro-6011e.firebasestorage.app",
            messagingSenderId: "922112980364",
            appId: "1:922112980364:web:09060e9ed3405f5e7b12a9",
            measurementId: "G-5H3RGWT5MX"
};

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            window.auth = auth;
            window.db = db;

            window.signInWithEmailAndPassword = signInWithEmailAndPassword;
            window.updateEmail = updateEmail;
            window.updatePassword = updatePassword;
            window.EmailAuthProvider = EmailAuthProvider;
            window.reauthenticateWithCredential = reauthenticateWithCredential;
            window.getDocs = getDocs;
            window.collection = collection;

            window.salvarNoFirebase = async function (
            nome,
            telefone,
            servico,
            data,
            hora
            ) {
        try {
                await addDoc(collection(db, "Agendamentos"), {
                    nome,
                    telefone,
                    servico,
                    data,
                    hora
                });

            console.log("Agendamento salvo no Firebase!");

        } catch (erro) {
                console.error("Erro ao salvar:", erro);
        }
};

            console.log("Firebase carregado com sucesso!");

    </script>

</body>
</html>
